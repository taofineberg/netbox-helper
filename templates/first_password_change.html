<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Netbox Helper</title>
    <link rel="icon" type="image/png" href="{{ url_for('app_icon') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --error-color: #f85149;
            --border-color: #30363d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 34px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            margin: 0 0 10px;
            font-size: 1.25rem;
        }

        p {
            margin: 0 0 20px;
            color: #8b949e;
            font-size: 0.86rem;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #8b949e;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 14px;
        }

        input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .error {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 12px;
        }

        .site-footer {
            width: 100%;
            border-top: 1px solid var(--border-color);
            color: #8b949e;
            font-size: 0.72rem;
            letter-spacing: 0.02em;
            text-align: center;
            padding: 10px 12px;
            background: rgba(1, 4, 9, 0.65);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Password Change Required</h1>
            <p>User <strong>{{ username }}</strong> must set a new password before using the application.</p>
            <form method="POST" action="{{ url_for('first_password_change') }}">
                <label>Current password</label>
                <input type="password" name="current_password" required autofocus>
                <label>New password</label>
                <input type="password" name="new_password" required>
                <label>Confirm new password</label>
                <input type="password" name="confirm_password" required>
                <button type="submit">Update Password</button>
                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}
            </form>
        </div>
    </div>
    <footer class="site-footer">Develpoyed by ITG | Tao Fineberg</footer>
</body>
</html>
