# Nginx configuration template for Netbox Helper
# Copy to: /etc/nginx/sites-available/netbox-helper
# Enable with: sudo ln -s /etc/nginx/sites-available/netbox-helper /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Restart: sudo systemctl restart nginx

# IMPORTANT: Replace "netbox-helper.example.com" with your actual domain!
# IMPORTANT: Update SSL certificate paths below to your certificate locations!

upstream netbox_helper_backend {
    # Point to Gunicorn running on internal port 8000
    server 127.0.0.1:8000;
    # Add more for load balancing across multiple instances:
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
    # server 127.0.0.1:8003;
}

# HTTP server block - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name netbox-helper.example.com www.netbox-helper.example.com;
    
    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name netbox-helper.example.com www.netbox-helper.example.com;
    
    # ========================================================================
    # SSL Configuration
    # ========================================================================
    
    # CUSTOMIZE THESE PATHS TO YOUR SSL CERTIFICATE LOCATIONS
    ssl_certificate /etc/ssl/certs/netbox-helper.crt;
    ssl_certificate_key /etc/ssl/private/netbox-helper.key;
    
    # Example paths if using Let's Encrypt:
    # ssl_certificate /etc/letsencrypt/live/netbox-helper.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/netbox-helper.example.com/privkey.pem;
    
    # SSL protocols and ciphers (Mozilla recommended)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # SSL session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # ========================================================================
    # Security Headers
    # ========================================================================
    
    # HTTP Strict Transport Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Clickjacking protection
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (optional - may need adjustment based on app)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    # ========================================================================
    # Logging
    # ========================================================================
    
    access_log /var/log/nginx/netbox-helper-access.log combined;
    error_log /var/log/nginx/netbox-helper-error.log warn;
    
    # ========================================================================
    # Reverse Proxy Configuration
    # ========================================================================
    
    # Client upload limit (must match Flask MAX_CONTENT_LENGTH: 16MB)
    client_max_body_size 16M;
    
    # Main location block
    location / {
        # Proxy settings
        proxy_pass http://netbox_helper_backend;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Disable proxy redirect rewriting
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # ========================================================================
    # Static file caching (optional - if serving static files through Nginx)
    # ========================================================================
    
    # location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }
    
    # ========================================================================
    # Deny access to sensitive files
    # ========================================================================
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
